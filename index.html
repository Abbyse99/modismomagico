<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Encargos</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:
    radial-gradient(circle at center,#2a1845 0%,#09060f 60%);
    min-height:100vh;
    font-family:'Cinzel',serif;
    color:#e8d6b0;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:50px;
}

.titulo{
    text-align:center;
    margin-bottom:70px;
}

.titulo h1{
    font-size:4rem;
    letter-spacing:4px;
}

.titulo p{
    color:#b88cff;
    margin-top:15px;
}

.clientes{
    display:flex;
    justify-content:center;
    gap:50px;
    flex-wrap:wrap;
}

.carta{

    width:350px;

    background:rgba(10,8,15,.9);

    border:1px solid #7b52d1;

    padding:15px;

    position:relative;

    box-shadow:
    0 0 30px rgba(123,82,209,.3);

    transition:.4s;
}

.carta:hover{
    transform:translateY(-10px);
    box-shadow:
    0 0 50px rgba(123,82,209,.6);
}

.carta::before{
    content:"";
    position:absolute;
    inset:8px;
    border:1px solid rgba(184,140,255,.4);
    pointer-events:none;
}

.foto{
    width:100%;
    height:500px;
    object-fit:cover;
    border:1px solid #7b52d1;
}

.nombre{
    text-align:center;
    margin-top:20px;
    font-size:2rem;
}

.casa{
    text-align:center;
    color:#9ea7ff;
    margin-top:10px;
    margin-bottom:25px;
}

.boton{
    display:block;
    width:100%;
    text-align:center;
    text-decoration:none;
    color:white;

    border:1px solid #7b52d1;

    padding:15px;

    transition:.3s;
}

.boton:hover{
    background:#7b52d1;
}

.decoracion{
    text-align:center;
    font-size:2rem;
    color:#b88cff;
    margin:40px 0;
}

</style>
</head>

<body>

<div class="container">

<div class="titulo">

<h1>REGISTRO DE ENCARGOS</h1>

<p>Modismo Mágico</p>

<div class="decoracion">✦ ✧ ✦</div>

</div>

<div class="clientes">

<div class="carta">

<img src="img/amelia.jpg" class="foto">

<div class="nombre">
Amelia Crawford
</div>

<div class="casa">
Ravenclaw
</div>

<a href="amelia.html" class="boton">
Ver expediente
</a>

</div>

<div class="carta">

<img src="img/vivi.jpg" class="foto">

<div class="nombre">
Vivi Ornitier
</div>

<div class="casa">
Ravenclaw
</div>

<a href="vivi.html" class="boton">
Ver expediente
</a>

</div>

</div>

</div>

</body>
</html>
