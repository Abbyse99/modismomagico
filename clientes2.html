<body>

<div class="libro">

    <!-- PAGINA IZQUIERDA -->

    <div class="pagina">

        <div style="
            width:280px;
            height:380px;
            border:1px solid #8f69ff;
            opacity:.25;
            margin-bottom:35px;
        ">
        </div>

        <div class="nombre" style="
            opacity:.25;
            font-size:2rem;
        ">
            PÁGINA DISPONIBLE
        </div>

    </div>

    <!-- PAGINA DERECHA -->

    <div class="pagina">

        <div style="
            width:280px;
            height:380px;
            border:1px solid #8f69ff;
            opacity:.25;
            margin-bottom:35px;
        ">
        </div>

        <div class="nombre" style="
            opacity:.25;
            font-size:2rem;
        ">
            PÁGINA DISPONIBLE
        </div>

    </div>

    <!-- VOLVER A CLIENTES -->

    <a href="clientes.html" class="flecha" style="
        left:25px;
        right:auto;
    ">
        ❮
    </a>

    <a href="index.html" class="cerrar">
        ✦ Cerrar grimorio
    </a>

</div>

<div class="transicion" id="transicion"></div>

<script>

document.querySelectorAll('a').forEach(enlace => {

    enlace.addEventListener('click', function(e){

        const destino = this.getAttribute('href');

        if(!destino) return;

        e.preventDefault();

        document
        .getElementById('transicion')
        .classList
        .add('activa');

        setTimeout(() => {

            window.location.href = destino;

        }, 650);

    });

});

</script>

</body>
