<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grimorio</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at center,
    #1d0d32 0%,
    #0a0315 60%,
    #000000 100%);

    font-family:'Cinzel', serif;

    overflow:hidden;
}

/* LIBRO */

.libro{

    width:92vw;
    height:90vh;

    position:relative;

    display:flex;

    border:1px solid #8f69ff;

    background:
    linear-gradient(
    90deg,
    #170d26 0%,
    #1f1431 47%,
    #12091e 50%,
    #1f1431 53%,
    #170d26 100%);

    box-shadow:
    0 0 50px rgba(143,105,255,.15);

}

/* LOMO */

.libro::after{

    content:"";

    position:absolute;

    left:50%;
    top:0;

    width:6px;
    height:100%;

    transform:translateX(-50%);

    background:
    linear-gradient(
    to right,
    rgba(255,255,255,.03),
    rgba(143,105,255,.6),
    rgba(255,255,255,.03));

    box-shadow:
    0 0 25px rgba(143,105,255,.5);
}

/* PAGINAS */

.pagina{

    flex:1;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;
}

/* RETRATOS */

.foto{

    width:280px;
    height:380px;

    border:1px solid #8f69ff;

    overflow:hidden;

    transition:.4s;

    margin-bottom:35px;
}

.foto:hover{

    box-shadow:
    0 0 20px rgba(143,105,255,.4),
    0 0 50px rgba(143,105,255,.2);

    transform:translateY(-4px);
}

.foto img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* NOMBRES */

.nombre{

    font-size:3rem;

    color:#f4eaff;

    margin-bottom:20px;

    transition:.3s;
}

.nombre:hover{

    text-shadow:
    0 0 15px rgba(210,180,255,.7);
}

/* CASA */

.casa{

    color:#9d73ff;

    letter-spacing:3px;

    margin-bottom:40px;
}

/* BOTÓN */

.boton{

    text-decoration:none;

    color:white;

    border:1px solid #8f69ff;

    padding:16px 42px;

    transition:.35s;
}

.boton:hover{

    background:rgba(143,105,255,.12);

    box-shadow:
    0 0 10px #8f69ff,
    0 0 30px rgba(143,105,255,.4);

    transform:translateY(-3px);
}

/* FLECHA */

.flecha{

    position:absolute;

    right:25px;

    top:50%;

    transform:translateY(-50%);

    color:#8f69ff;

    text-decoration:none;

    font-size:4rem;

    animation:flotar 2s ease-in-out infinite;

    transition:.3s;
}

.flecha:hover{

    color:#e6d8ff;

    text-shadow:
    0 0 15px #b88cff,
    0 0 30px #b88cff;
}

@keyframes flotar{

    0%{
        transform:translateY(-50%);
    }

    50%{
        transform:translateY(-58%);
    }

    100%{
        transform:translateY(-50%);
    }
}

/* CERRAR */

.cerrar{

    position:absolute;

    bottom:30px;

    left:30px;

    color:#8f69ff;

    text-decoration:none;

    font-size:.9rem;
}

.cerrar:hover{

    color:#e6d8ff;
}

/* TRANSICIÓN */

.transicion{

    position:fixed;

    inset:0;

    background:
    radial-gradient(
    circle,
    rgba(143,105,255,.6) 0%,
    rgba(20,5,40,.95) 50%,
    #000 100%);

    opacity:0;

    pointer-events:none;

    z-index:9999;
}

.transicion.activa{

    animation:abrir .7s forwards;
}

@keyframes abrir{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="libro">

    <!-- AMELIA -->

    <div class="pagina">

        <div class="foto">
            <img src="amelia.jpeg" alt="Amelia Crawford">
        </div>

        <div class="nombre">
            Amelia Crawford
        </div>

        <div class="casa">
            RAVENCLAW
        </div>

        <a href="amelia.html" class="boton">
            VER EXPEDIENTE
        </a>

    </div>

    <!-- VIVI -->

    <div class="pagina">

        <div class="foto">
            <img src="vivi.png" alt="Vivi Ornitier">
        </div>

        <div class="nombre">
            Vivi Ornitier
        </div>

        <div class="casa">
            RAVENCLAW
        </div>

        <a href="vivi.html" class="boton">
            VER EXPEDIENTE
        </a>

    </div>

    <!-- SIGUIENTE PÁGINA -->

    <a href="clientes2.html" class="flecha">❯</a>

    <!-- CERRAR -->

    <a href="index.html" class="cerrar">
        ✦ Cerrar grimorio
    </a>

</div>

<div class="transicion" id="transicion"></div>

<script>

document.querySelectorAll('a').forEach(enlace => {

    enlace.addEventListener('click', function(e){

        const destino = this.getAttribute('href');

        if(!destino) return;

        e.preventDefault();

        document
        .getElementById('transicion')
        .classList
        .add('activa');

        setTimeout(() => {

            window.location.href = destino;

        }, 650);

    });

});

</script>

</body>
</html>
