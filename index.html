<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Encargos</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:
radial-gradient(circle at center,#18121f 0%,#08070b 55%,#000 100%);
font-family:'Cinzel',serif;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);
background-size:6px 6px;
opacity:.25;
pointer-events:none;
}

/* LIBRO */

.libro{
width:650px;
height:850px;
position:relative;
text-decoration:none;
cursor:pointer;
overflow:hidden;
border-radius:12px;

background:
radial-gradient(
circle at center,
rgba(60,30,90,.45) 0%,
rgba(20,10,35,.9) 40%,
#050306 100%
);

transition:.4s;

animation:latido 8s ease-in-out infinite;

box-shadow:
0 0 30px rgba(70,40,120,.35),
0 0 120px rgba(40,20,70,.4),
inset 0 0 40px rgba(0,0,0,.8);
}

.libro::before{
content:"";
position:absolute;
inset:0;

background:
radial-gradient(circle at 20% 30%, rgba(130,80,190,.08), transparent 35%),
radial-gradient(circle at 80% 70%, rgba(100,60,170,.06), transparent 40%),
radial-gradient(circle at center, rgba(70,40,120,.05), transparent 60%);

filter:blur(25px);
opacity:.9;
pointer-events:none;
}

.libro::after{
content:"✠";
position:absolute;
top:35px;
left:50%;
transform:translateX(-50%);
font-size:2rem;
color:rgba(205,185,234,.18);
text-shadow:0 0 15px rgba(130,80,190,.3);
pointer-events:none;
}

.libro:hover{
transform:scale(1.015);
}

/* CONTENIDO */

.contenido{
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:60px;
position:relative;
z-index:2;
}

.nombre{
color:#c9bdd8;
font-size:1.1rem;
letter-spacing:16px;
margin-bottom:30px;
}

h1{
position:relative;
font-size:4.8rem;
line-height:1;
color:#f2edf7;
text-shadow:
0 0 8px rgba(255,255,255,.08),
0 0 25px rgba(140,90,255,.12);
}

h1::before{
content:"";
position:absolute;
width:320px;
height:320px;

background:
radial-gradient(
rgba(184,140,255,.08),
transparent 70%
);

left:50%;
top:50%;
transform:translate(-50%,-50%);
z-index:-1;

animation:halo 6s ease-in-out infinite;
}

.subtitulo{
margin-top:25px;
color:#9a8aac;
letter-spacing:8px;
font-size:.9rem;
}

.sigilo{
margin-top:25px;
font-size:2.5rem;
color:rgba(205,185,234,.25);
animation:flotarSigilo 5s ease-in-out infinite;
}

.frase{
margin-top:35px;
color:#9f94ac;
line-height:2;
font-style:italic;
}

.boton{
margin-top:65px;

border:1px solid rgba(143,105,255,.25);

padding:18px 50px;

color:#e8dfff;

letter-spacing:5px;

background:
rgba(255,255,255,.02);

transition:.35s;
}

.boton:hover{
background:rgba(120,90,170,.08);
box-shadow:0 0 25px rgba(120,90,170,.2);
}

/* PARTÍCULAS */

.particula,
.destello{
position:fixed;
pointer-events:none;
}

.particula{
width:2px;
height:2px;
border-radius:50%;
background:#9d7cd4;
opacity:.3;
animation:subir linear forwards;
}

.destello{
color:#cdb9ea;
opacity:0;
animation:destello 4s linear forwards;
}

/* TRANSICIÓN */

.transicion{
position:fixed;
inset:0;

background:
radial-gradient(
circle,
rgba(120,90,170,.5) 0%,
rgba(15,10,20,.95) 45%,
#000 100%
);

opacity:0;
pointer-events:none;
z-index:9999;
}

.transicion.activa{
animation:abrir 1s forwards;
}

/* ANIMACIONES */

@keyframes halo{
0%,100%{
opacity:.3;
transform:translate(-50%,-50%) scale(.9);
}
50%{
opacity:.7;
transform:translate(-50%,-50%) scale(1.1);
}
}

@keyframes flotarSigilo{
50%{
transform:translateY(-8px);
}
}

@keyframes latido{
50%{
box-shadow:
0 0 60px rgba(90,60,130,.4),
0 0 180px rgba(40,20,70,.5),
inset 0 0 40px rgba(0,0,0,.8);
}
}

@keyframes subir{
0%{
opacity:0;
transform:translateY(0) scale(0);
}
20%{
opacity:.3;
}
100%{
opacity:0;
transform:translateY(-350px) scale(1.2);
}
}

@keyframes destello{
20%{
opacity:.8;
}
100%{
opacity:0;
transform:scale(1.8);
}
}

@keyframes abrir{
to{
opacity:1;
}
}

</style>
</head>

<body>

<a href="clientes.html" class="libro" id="grimorio">

<div class="contenido">

<div class="nombre">
D A P H N E
</div>

<h1>
REGISTRO<br>
DE ENCARGOS
</h1>

<div class="subtitulo">
MODISMO MÁGICO
</div>

<div class="sigilo">
☾ ✦ ☽
</div>

<div class="frase">
Cada puntada guarda un secreto.<br>
Cada encargo permanece escrito.
</div>

<div class="boton">
ABRIR GRIMORIO
</div>

</div>

</a>

<div class="transicion" id="transicion"></div>

<script>

setInterval(()=>{

const p=document.createElement('div');

p.className='particula';

p.style.left=Math.random()*window.innerWidth+'px';
p.style.bottom='-10px';

p.style.animationDuration=
(8+Math.random()*6)+'s';

document.body.appendChild(p);

setTimeout(()=>{
p.remove();
},14000);

},500);

setInterval(()=>{

const d=document.createElement('div');

d.className='destello';
d.innerHTML='✦';

d.style.left=Math.random()*window.innerWidth+'px';
d.style.top=Math.random()*window.innerHeight+'px';

d.style.fontSize=
(10+Math.random()*20)+'px';

document.body.appendChild(d);

setTimeout(()=>{
d.remove();
},4000);

},1200);

document
.getElementById('grimorio')
.addEventListener('click',e=>{

e.preventDefault();

document
.getElementById('transicion')
.classList.add('activa');

setTimeout(()=>{
window.location.href='clientes.html';
},900);

});

</script>

</body>
</html>
