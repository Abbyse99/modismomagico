<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grimorio</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at center,
    #2a143f 0%,
    #12091f 40%,
    #050308 100%);

    font-family:'Cinzel', serif;
}

/* LIBRO */

.libro{

    width:1200px;
    height:800px;

    background:
    linear-gradient(
    90deg,
    #18111f 0%,
    #21172d 45%,
    #120c19 50%,
    #21172d 55%,
    #18111f 100%);

    border:2px solid #7f59d8;

    box-shadow:
    0 0 100px rgba(127,89,216,.25);

    position:relative;

    display:flex;

    overflow:hidden;
}

/* LOMO */

.libro::after{

    content:"";

    position:absolute;

    left:50%;
    top:0;

    width:3px;
    height:100%;

    background:#7f59d8;

    transform:translateX(-50%);
}

/* PAGINAS */

.pagina{

    flex:1;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    padding:60px;
}

/* FOTOS */

.foto{

    width:280px;
    height:380px;

    border:1px solid #7f59d8;

    overflow:hidden;

    margin-bottom:30px;
}

.foto img{

    width:100%;
    height:100%;

    object-fit:cover;
}

/* TEXTOS */

.nombre{

    color:#f3e9ff;

    font-size:2rem;

    margin-bottom:10px;
}

.casa{

    color:#b88cff;

    margin-bottom:30px;

    letter-spacing:2px;
}

/* BOTONES */

.boton{

    text-decoration:none;

    color:#f3e9ff;

    border:1px solid #8f69ff;

    padding:15px 35px;

    transition:.3s;
}

.boton:hover{

    background:rgba(143,105,255,.15);

    box-shadow:
    0 0 20px rgba(143,105,255,.3);
}

/* VOLVER */

.cerrar{

    position:absolute;

    bottom:25px;
    left:25px;

    text-decoration:none;

    color:#8f69ff;

    font-size:.9rem;
}

.cerrar:hover{

    color:#d8c2ff;
}

/* FLECHAS */

.flecha{

    position:absolute;

    top:50%;

    transform:translateY(-50%);

    text-decoration:none;

    color:#8f69ff;

    font-size:3rem;

    transition:.3s;
}

.flecha:hover{

    color:#d8c2ff;

    transform:
    translateY(-50%)
    scale(1.15);
}

.izquierda{

    left:20px;
}

.derecha{

    right:20px;
}

</style>
</head>

<body>

<div class="libro">

    <!-- Flechas -->
    <a href="#" class="flecha izquierda">❮</a>
    <a href="clientes2.html" class="flecha derecha">❯</a>

    <!-- Página izquierda -->
    <div class="pagina">

        <div class="foto">
            <img src="amelia.jpg" alt="Amelia">
        </div>

        <div class="nombre">
            Amelia Crawford
        </div>

        <div class="casa">
            Ravenclaw
        </div>

        <a href="amelia.html" class="boton">
            Ver expediente
        </a>

    </div>

    <!-- Página derecha -->
    <div class="pagina">

        <div class="foto">
            <img src="vivi.jpg" alt="Vivi">
        </div>

        <div class="nombre">
            Vivi Ornitier
        </div>

        <div class="casa">
            Ravenclaw
        </div>

        <a href="vivi.html" class="boton">
            Ver expediente
        </a>

    </div>

    <a href="index.html" class="cerrar">
        ✦ Cerrar grimorio
    </a>

</div>

</body>
</html>
