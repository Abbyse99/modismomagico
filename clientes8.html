<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>clientes8</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(circle at center,#18121f,#08070b 60%,#000);font-family:'Cinzel',serif;overflow:hidden;}
.libro{width:780px;height:500px;margin:20px auto;display:flex;position:relative;background:linear-gradient(90deg,#09090b 0%,#050506 47%,#000 50%,#050506 53%,#09090b 100%);box-shadow:0 0 80px rgba(90,60,130,.22);overflow:hidden;}
.libro:after{content:"";position:absolute;left:50%;top:0;width:4px;height:100%;transform:translateX(-50%);background:linear-gradient(to right,transparent,rgba(184,140,255,.25),transparent);}
.pagina{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;position:relative;padding:20px}

/* IZQUIERDA */
.foto{width:180px;height:240px;overflow:hidden;position:relative;margin-bottom:20px;transition:.4s;box-shadow:0 0 20px rgba(143,105,255,.15)}
.foto:before{content:"";position:absolute;width:280px;height:280px;background:radial-gradient(rgba(184,140,255,.08),transparent 70%);left:50%;top:50%;transform:translate(-50%,-50%);z-index:-1;animation:halo 6s ease-in-out infinite}
.foto:hover{transform:translateY(-4px);box-shadow:0 0 20px rgba(143,105,255,.35)}
.foto img{width:100%;height:100%;object-fit:cover}
.nombre{font-size:1.6rem;color:#f2edf7;margin-bottom:12px}
.casa{color:#9d73ff;letter-spacing:2px;margin-bottom:25px;font-size:.8rem}
.boton{position:relative;overflow:hidden;text-decoration:none;color:#e8dfff;border:1px solid rgba(143,105,255,.3);padding:12px 25px;background:rgba(255,255,255,.02);transition:.4s;font-size:.75rem;letter-spacing:1px}
.boton:before{content:"";position:absolute;top:0;left:-120%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);transition:.7s}
.boton:hover{background:rgba(143,105,255,.12);border-color:rgba(143,105,255,.7);transform:translateY(-2px)}
.boton:hover:before{left:120%}

/* DERECHA */
.aura{position:absolute;width:320px;height:320px;border-radius:50%;left:50%;top:43%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(155,110,255,.18),transparent 70%);animation:pulse 6s ease-in-out infinite}
.sello{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%) rotate(45deg);width:150px;height:150px;border:1px solid rgba(190,160,255,.25);box-shadow:0 0 30px rgba(160,120,255,.15)}
.sello:before,.sello:after{content:"";position:absolute;inset:12px;border:1px solid rgba(190,160,255,.15)}
.logo{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);font-size:48px;color:#d8c2ff;text-shadow:0 0 20px rgba(184,140,255,.5)}
.titulo{position:absolute;top:58%;width:100%;font-size:2.1rem;color:#f4eefb}
.sub{position:absolute;top:67%;width:100%;letter-spacing:6px;color:#b88cff;font-size:.8rem}
.linea{position:absolute;top:74%;left:50%;transform:translateX(-50%);width:170px;height:1px;background:linear-gradient(90deg,transparent,#b88cff,transparent)}
.frase{position:absolute;bottom:55px;width:80%;left:10%;font-family:"Cormorant Garamond",serif;font-size:1.25rem;font-style:italic;color:#ddd3ef}
.runa{position:absolute;color:#9f79ff66;font-size:22px;animation:float 7s ease-in-out infinite}
.r1{left:35px;top:40px}.r2{right:40px;top:70px;animation-delay:1s}.r3{left:55px;bottom:110px;animation-delay:2s}.r4{right:55px;bottom:80px;animation-delay:3s}

.flecha{position:absolute;left:15px;top:50%;transform:translateY(-50%);font-size:2.5rem;color:#b88cff;text-decoration:none}
.cerrar{position:absolute;left:15px;bottom:15px;color:#8f69ff;text-decoration:none;font-size:.8rem}
.particula{position:fixed;color:#b88cff;opacity:.35;pointer-events:none;animation:subir linear forwards}
.transicion{position:fixed;inset:0;background:radial-gradient(circle,rgba(120,90,170,.5),rgba(15,10,20,.95)45%,#000);opacity:0;pointer-events:none}
.transicion.activa{animation:abrir .8s forwards}

@keyframes halo{50%{transform:translate(-50%,-50%) scale(1.1)}}
@keyframes pulse{50%{transform:translate(-50%,-50%) scale(1.08)}}
@keyframes float{50%{transform:translateY(-12px) rotate(12deg);opacity:1}}
@keyframes subir{0%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:.4}100%{opacity:0;transform:translateY(-350px) scale(1.2)}}
@keyframes abrir{to{opacity:1}}
</style>
</head>
<body>
<div class="libro">

<div class="pagina">
<div class="foto"><img src="daphne.png" alt="Daphne Rosier"></div>
<div class="nombre">Daphne Rosier</div>
<div class="casa">SLYTHERIN</div>
<a class="boton" href="daphne.html">VER EXPEDIENTE</a>
</div>

<div class="pagina">
<div class="aura"></div>
<div class="sello"></div>
<div class="logo">✦</div>

<div class="runa r1">ᚠ</div>
<div class="runa r2">☾</div>
<div class="runa r3">ᛉ</div>
<div class="runa r4">ᚱ</div>

<div class="titulo">Nocturna Atelier</div>
<div class="sub">BY DAPHNE</div>
<div class="linea"></div>
<div class="frase">«Cada puntada ata un destino»</div>
</div>

<a href="clientes7.html" class="flecha">❮</a>
<a href="index.html" class="cerrar">✦ Cerrar grimorio</a>
</div>
<div class="transicion" id="transicion"></div>

<script>
setInterval(()=>{
const p=document.createElement("div");
p.className="particula";
p.textContent=["✦","☾","☽","✧"][Math.floor(Math.random()*4)];
p.style.left=Math.random()*innerWidth+"px";
p.style.bottom="-10px";
p.style.fontSize=(10+Math.random()*12)+"px";
p.style.animationDuration=(8+Math.random()*5)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),13000);
},900);

document.querySelectorAll("a").forEach(a=>a.addEventListener("click",e=>{
e.preventDefault();
document.getElementById("transicion").classList.add("activa");
setTimeout(()=>location.href=a.href,700);
}));
</script>
</body>
</html>
