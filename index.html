<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Encargos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
background:radial-gradient(circle at center,#18121f 0%,#08070b 55%,#000 100%);
font-family:'Cinzel',serif;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;
background:radial-gradient(rgba(255,255,255,.02) 1px,transparent 1px);
background-size:6px 6px;
opacity:.2;
pointer-events:none;
}

.libro{
width:780px;
height:500px;
margin:20px auto;
position:relative;
text-decoration:none;
overflow:hidden;
cursor:pointer;
border-radius:8px;

background:
linear-gradient(
180deg,
#090909 0%,
#050505 45%,
#020202 100%
);

border:1px solid rgba(255,255,255,.03);

box-shadow:
0 0 40px rgba(0,0,0,.9),
0 0 80px rgba(40,20,70,.15);

transition:.4s;
animation:latido 8s ease-in-out infinite;
}

.libro::before{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at center,rgba(100,70,160,.04),transparent 70%);
pointer-events:none;
}

.libro::after{
content:"";
position:absolute;
inset:15px;
border:1px solid rgba(255,255,255,.03);
pointer-events:none;
}

.libro:hover{
transform:scale(1.01);
}

.contenido{
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:35px;
position:relative;
z-index:2;
}

.nombre{
color:#c9bdd8;
font-size:.9rem;
letter-spacing:10px;
margin-bottom:20px;
}

h1{
font-size:3rem;
line-height:1;
color:#f0edf5;
text-shadow:0 0 3px rgba(255,255,255,.08);
}

.subtitulo{
margin-top:18px;
color:#8f829d;
letter-spacing:5px;
font-size:.8rem;
}

.sigilo{
margin-top:15px;
font-size:1.4rem;
color:rgba(255,255,255,.08);
}

.frase{
margin-top:25px;
color:#9f94ac;
line-height:1.8;
font-style:italic;
font-size:.9rem;
}

.boton{
margin-top:35px;
border:1px solid rgba(143,105,255,.18);
padding:14px 35px;
color:#e8dfff;
letter-spacing:4px;
background:rgba(255,255,255,.02);
transition:.35s;
font-size:.85rem;
}

.particula{
position:fixed;
pointer-events:none;
width:2px;
height:2px;
border-radius:50%;
background:#7b63a8;
opacity:.25;
animation:subir linear forwards;
}

.transicion{
position:fixed;
inset:0;
background:radial-gradient(circle,rgba(90,60,130,.35) 0%,rgba(10,10,10,.95) 45%,#000 100%);
opacity:0;
pointer-events:none;
z-index:9999;
}

.transicion.activa{
animation:abrir 1s forwards;
}

@keyframes latido{
50%{
box-shadow:0 0 50px rgba(0,0,0,.95),0 0 100px rgba(40,20,70,.2);
}
}

@keyframes subir{
0%{opacity:0;transform:translateY(0) scale(0);}
20%{opacity:.25;}
100%{opacity:0;transform:translateY(-350px) scale(1.2);}
}

@keyframes abrir{
to{opacity:1;}
}
</style>
</head>

<body>

<a href="clientes.html" class="libro" id="grimorio">

<div class="contenido">

<div class="nombre">D A P H N E</div>

<h1>REGISTRO<br>DE ENCARGOS</h1>

<div class="subtitulo">MODISMO MÁGICO</div>

<div class="sigilo">†</div>

<div class="frase">
Cada puntada guarda un secreto.<br>
Cada encargo permanece escrito.
</div>

<div class="boton">ABRIR GRIMORIO</div>

</div>
</a>

<div class="transicion" id="transicion"></div>

<script>
setInterval(()=>{
const p=document.createElement('div');
p.className='particula';
p.style.left=Math.random()*window.innerWidth+'px';
p.style.bottom='-10px';
p.style.animationDuration=(8+Math.random()*6)+'s';
document.body.appendChild(p);
setTimeout(()=>p.remove(),14000);
},700);

document.getElementById('grimorio').addEventListener('click',e=>{
e.preventDefault();
document.getElementById('transicion').classList.add('activa');
setTimeout(()=>window.location.href='clientes.html',900);
});
</script>

</body>
</html>
