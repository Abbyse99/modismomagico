<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Encargos</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(
    circle at center,
    #18121f 0%,
    #08070b 55%,
    #000000 100%);

    font-family:'Cinzel', serif;

    overflow:hidden;
}

/* TEXTURA */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    radial-gradient(
    rgba(255,255,255,.02) 1px,
    transparent 1px);

    background-size:6px 6px;

    opacity:.25;

    pointer-events:none;
}

/* LIBRO */

.libro{

    width:650px;
    height:850px;

    position:relative;

    text-decoration:none;

    background:
    linear-gradient(
    135deg,
    #0a090c,
    #040305,
    #000000);

    border-radius:12px;

    cursor:pointer;

    overflow:hidden;

    transition:.4s;

    animation:latido 8s ease-in-out infinite;

    box-shadow:
    0 0 80px rgba(90,60,130,.15),
    0 0 200px rgba(40,20,70,.2);
}

.libro:hover{

    transform:scale(1.015);

    box-shadow:
    0 0 120px rgba(90,60,130,.25),
    0 0 240px rgba(40,20,70,.3);
}

/* ENERGÍA OSCURA */

.libro::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
    45deg,
    transparent,
    rgba(120,90,170,.05),
    transparent);

    animation:energia 12s linear infinite;

    pointer-events:none;
}

/* CONTENIDO */

.contenido{

    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;

    padding:60px;

    position:relative;

    z-index:2;
}

.nombre{

    color:#c9bdd8;

    font-size:1.1rem;

    letter-spacing:16px;

    margin-bottom:30px;
}

h1{

    font-size:4.8rem;

    line-height:1;

    color:#f2edf7;

    text-shadow:
    0 0 8px rgba(255,255,255,.08);
}

.subtitulo{

    margin-top:25px;

    color:#9a8aac;

    letter-spacing:8px;

    font-size:.9rem;
}

.ornamento{

    margin-top:35px;

    color:#cdb9ea;

    font-size:1.4rem;

    letter-spacing:25px;
}

.frase{

    margin-top:45px;

    color:#9f94ac;

    line-height:2;

    font-style:italic;
}

.boton{

    margin-top:65px;

    border:1px solid rgba(143,105,255,.3);

    padding:18px 50px;

    color:#e8dfff;

    letter-spacing:5px;

    background:
    rgba(255,255,255,.02);

    transition:.35s;
}

.libro:hover .boton{

    background:
    rgba(143,105,255,.08);

    box-shadow:
    0 0 20px rgba(143,105,255,.15);
}

/* PARTÍCULAS */

.particula{

    position:fixed;

    width:2px;
    height:2px;

    border-radius:50%;

    background:#9d7cd4;

    opacity:.3;

    pointer-events:none;

    animation:subir linear forwards;
}

/* TRANSICIÓN */

.transicion{

    position:fixed;

    inset:0;

    background:
    radial-gradient(
    circle,
    rgba(120,90,170,.5) 0%,
    rgba(15,10,20,.95) 45%,
    #000 100%);

    opacity:0;

    pointer-events:none;

    z-index:9999;
}

.transicion.activa{

    animation:abrir 1s forwards;
}

/* ANIMACIONES */

@keyframes energia{

    from{
        transform:translateX(-30%);
    }

    to{
        transform:translateX(30%);
    }
}

@keyframes latido{

    0%{

        box-shadow:
        0 0 80px rgba(90,60,130,.15),
        0 0 200px rgba(40,20,70,.2);
    }

    50%{

        box-shadow:
        0 0 140px rgba(90,60,130,.25),
        0 0 260px rgba(40,20,70,.35);
    }

    100%{

        box-shadow:
        0 0 80px rgba(90,60,130,.15),
        0 0 200px rgba(40,20,70,.2);
    }
}

@keyframes subir{

    from{

        opacity:0;

        transform:
        translateY(0)
        scale(0);
    }

    20%{

        opacity:.3;
    }

    to{

        opacity:0;

        transform:
        translateY(-350px)
        scale(1.2);
    }
}

@keyframes abrir{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<a href="clientes.html" class="libro" id="grimorio">

<div class="contenido">

<div class="nombre">
D A P H N E
</div>

<h1>
REGISTRO<br>
DE ENCARGOS
</h1>

<div class="subtitulo">
MODISMO MÁGICO
</div>

<div class="ornamento">
✦ ✦ ✦
</div>

<div class="frase">
Cada puntada guarda un secreto.<br>
Cada encargo permanece escrito.
</div>

<div class="boton">
ABRIR GRIMORIO
</div>

</div>

</a>

<div class="transicion" id="transicion"></div>

<script>

setInterval(() => {

    const p = document.createElement('div');

    p.className = 'particula';

    p.style.left =
    Math.random() * window.innerWidth + 'px';

    p.style.bottom = '-10px';

    p.style.animationDuration =
    (8 + Math.random()*6) + 's';

    document.body.appendChild(p);

    setTimeout(() => {

        p.remove();

    },14000);

},500);

document.getElementById('grimorio')
.addEventListener('click', function(e){

    e.preventDefault();

    document
    .getElementById('transicion')
    .classList
    .add('activa');

    setTimeout(() => {

        window.location.href =
        'clientes.html';

    },900);

});

</script>

</body>
</html>
