<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Encargos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
padding:20px 0;
display:flex;
justify-content:center;
align-items:flex-start;
background:radial-gradient(circle at center,#18121f 0%,#08070b 55%,#000 100%);
font-family:'Cinzel',serif;
overflow-x:hidden;
}

.libro{
width:420px;
height:500px;
position:relative;
overflow:hidden;
border-radius:8px;
background:linear-gradient(180deg,#131018 0%,#09080d 45%,#030304 100%);
border:1px solid rgba(180,140,255,.08);
box-shadow:0 0 30px rgba(0,0,0,.9),0 0 80px rgba(80,40,150,.25),inset 0 0 40px rgba(255,255,255,.02);
}

.libro::after{
content:"";
position:absolute;
left:28px;
top:0;
width:16px;
height:100%;
background:linear-gradient(90deg,#000,#24182f,#3d2754,#24182f,#000);
}

.esquina{
position:absolute;
width:40px;
height:40px;
border:2px solid rgba(183,156,255,.25);
}

.esq1{top:12px;left:12px;border-right:none;border-bottom:none;}
.esq2{top:12px;right:12px;border-left:none;border-bottom:none;}
.esq3{bottom:12px;left:12px;border-right:none;border-top:none;}
.esq4{bottom:12px;right:12px;border-left:none;border-top:none;}

.contenido{
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:45px 40px 55px 40px;
position:relative;
z-index:2;
}

.nombre{
color:#c9bdd8;
font-size:.9rem;
letter-spacing:10px;
margin-bottom:18px;
}

.ornamento{
font-size:1.8rem;
color:#c8b1ff;
margin-bottom:20px;
letter-spacing:22px;
}

h1{
font-size:2.95rem;
line-height:1;
color:#f0edf5;
}

.subtitulo{
margin-top:16px;
color:#8f829d;
letter-spacing:5px;
font-size:.8rem;
}

.sigilo{
margin-top:12px;
font-size:1.4rem;
color:rgba(255,255,255,.08);
}

.frase{
margin-top:22px;
margin-bottom:28px;
color:#9f94ac;
line-height:1.9;
font-style:italic;
font-size:.82rem;
}

.botones{
display:flex;
flex-direction:column;
gap:10px;
}

.boton{
width:170px;
padding:11px 10px;
font-size:.72rem;
letter-spacing:4px;
text-decoration:none;
color:#e8dfff;
border:1px solid rgba(143,105,255,.18);
background:rgba(255,255,255,.02);
transition:.35s;
}

.boton:hover{
background:rgba(255,255,255,.05);
}
</style>
</head>
<body>

<div class="libro">
<div class="esquina esq1"></div>
<div class="esquina esq2"></div>
<div class="esquina esq3"></div>
<div class="esquina esq4"></div>

<div class="contenido">
<div class="nombre">D A P H N E</div>
<div class="ornamento">☾ ✦ ☽</div>
<h1>REGISTRO<br>DE ENCARGOS</h1>
<div class="subtitulo">MODISMO MÁGICO</div>
<div class="sigilo">†</div>

<div class="frase">
Cada puntada guarda un secreto.<br>
Cada encargo permanece escrito.
</div>

<div class="botones">
<a href="precios.html" class="boton">VER TARIFAS</a>
<a href="clientes.html" class="boton">ABRIR GRIMORIO</a>
</div>
</div>
</div>

</body>
</html>
