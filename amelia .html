
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amelia Crawford</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(
    circle at center,
    #18121f 0%,
    #08070b 55%,
    #000000 100%);

    font-family:'Cinzel', serif;

    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background:
    radial-gradient(
    rgba(255,255,255,.02) 1px,
    transparent 1px);

    background-size:6px 6px;

    opacity:.25;

    pointer-events:none;
}

/* LIBRO */

.libro{

    width:92vw;
    height:90vh;

    position:relative;

    display:flex;

    overflow:hidden;

    background:
    linear-gradient(
    90deg,
    #09090b 0%,
    #050506 47%,
    #000000 50%,
    #050506 53%,
    #09090b 100%);

    box-shadow:
    0 0 120px rgba(90,60,130,.18);
}

.libro::after{

    content:"";

    position:absolute;

    left:50%;
    top:0;

    width:4px;
    height:100%;

    transform:translateX(-50%);

    background:
    linear-gradient(
    to right,
    transparent,
    rgba(184,140,255,.25),
    transparent);
}

/* PAGINAS */

.pagina{

    flex:1;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    padding:60px;
}

/* FOTO */

.retrato{

    width:100%;
    max-width:720px;

    height:420px;

    overflow:hidden;

    position:relative;

    margin-bottom:35px;

    box-shadow:
    0 0 30px rgba(143,105,255,.15);
}

.retrato::before{

    content:"";

    position:absolute;

    width:700px;
    height:700px;

    left:50%;
    top:50%;

    transform:
    translate(-50%,-50%);

    background:
    radial-gradient(
    rgba(184,140,255,.08),
    transparent 70%);

    animation:
    halo 6s ease-in-out infinite;
}

.retrato img{

    width:100%;
    height:100%;

    object-fit:cover;

    position:relative;
    z-index:2;
}

.nombre{

    color:#f2edf7;

    font-size:2.8rem;

    text-align:center;

    text-shadow:
    0 0 10px rgba(184,140,255,.15);
}

/* EXPEDIENTE */

.titulo{

    color:#cdb9ea;

    font-size:2rem;

    margin-bottom:50px;

    letter-spacing:3px;
}

.campo{

    width:100%;

    margin-bottom:35px;
}

.etiqueta{

    color:#b88cff;

    font-size:1rem;

    letter-spacing:2px;

    margin-bottom:10px;
}

.valor{

    color:#f2edf7;

    padding-bottom:10px;

    border-bottom:
    1px solid rgba(184,140,255,.2);
}

.notas{

    margin-top:15px;

    color:#f2edf7;

    line-height:2.4;
}

.notas span{

    color:#b88cff;
}

/* NAVEGACIÓN */

.flecha{

    position:absolute;

    left:25px;

    top:50%;

    transform:translateY(-50%);

    color:#b88cff;

    text-decoration:none;

    font-size:4rem;

    animation:
    flotar 2s ease-in-out infinite;
}

.cerrar{

    position:absolute;

    bottom:30px;

    left:30px;

    color:#8f69ff;

    text-decoration:none;
}

/* DESTELLOS */

.destello{

    position:fixed;

    color:#cdb9ea;

    opacity:0;

    pointer-events:none;

    animation:
    destello 4s linear forwards;
}

/* TRANSICIÓN */

.transicion{

    position:fixed;

    inset:0;

    background:
    radial-gradient(
    circle,
    rgba(120,90,170,.5) 0%,
    rgba(15,10,20,.95) 45%,
    #000 100%);

    opacity:0;

    pointer-events:none;

    z-index:9999;
}

.transicion.activa{

    animation:
    abrir .8s forwards;
}

@keyframes halo{

    0%,100%{

        opacity:.3;

        transform:
        translate(-50%,-50%)
        scale(.9);
    }

    50%{

        opacity:.7;

        transform:
        translate(-50%,-50%)
        scale(1.1);
    }
}

@keyframes flotar{

    0%,100%{

        transform:
        translateY(-50%);
    }

    50%{

        transform:
        translateY(-58%);
    }
}

@keyframes destello{

    20%{
        opacity:.8;
    }

    100%{

        opacity:0;

        transform:
        scale(1.8);
    }
}

@keyframes abrir{

    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="libro">

    <div class="pagina">

        <div class="retrato">
            <img src="amelia2.png" alt="Amelia Crawford">
        </div>

        <div class="nombre">
            Amelia Crawford
        </div>

    </div>

    <div class="pagina">

        <div class="titulo">
            EXPEDIENTE
        </div>

        <div class="campo">
            <div class="etiqueta">
                CASA DE HOGWARTS
            </div>

            <div class="valor">
                Ravenclaw
            </div>
        </div>

        <div class="campo">
            <div class="etiqueta">
                ENCARGO
            </div>

            <div class="valor">
                &nbsp;
            </div>
        </div>

        <div class="campo">
            <div class="etiqueta">
                TIEMPO QUE LO TENDRÁ
            </div>

            <div class="valor">
                &nbsp;
            </div>
        </div>

        <div class="campo">

            <div class="etiqueta">
                OBSERVACIONES
            </div>

            <div class="notas">

                <span>✦</span> ___________________<br>
                <span>✦</span> ___________________<br>
                <span>✦</span> ___________________<br>
                <span>✦</span> ___________________

            </div>

        </div>

    </div>

    <a href="clientes.html" class="flecha">❮</a>

    <a href="index.html" class="cerrar">
        ✦ Cerrar grimorio
    </a>

</div>

<div class="transicion" id="transicion"></div>

<script>

setInterval(() => {

    const d = document.createElement('div');

    d.className = 'destello';

    d.innerHTML = '✦';

    d.style.left =
    Math.random()*window.innerWidth + 'px';

    d.style.top =
    Math.random()*window.innerHeight + 'px';

    d.style.fontSize =
    (10 + Math.random()*20) + 'px';

    document.body.appendChild(d);

    setTimeout(() => {

        d.remove();

    },4000);

},1200);

document.querySelectorAll('a').forEach(enlace => {

    enlace.addEventListener('click', function(e){

        const destino =
        this.getAttribute('href');

        e.preventDefault();

        document
        .getElementById('transicion')
        .classList
        .add('activa');

        setTimeout(() => {

            window.location.href =
            destino;

        },700);

    });

});

</script>

</body>
</html>
