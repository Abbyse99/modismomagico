<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro de Encargos</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at center,
    #2a143f 0%,
    #12091f 40%,
    #050308 100%);

    font-family:'Cinzel', serif;
    overflow:hidden;
}

body::before{
    content:"";
    position:fixed;
    inset:0;

    background-image:
    radial-gradient(
    rgba(255,255,255,.03) 1px,
    transparent 1px);

    background-size:4px 4px;
    pointer-events:none;
}

.libro{
    width:650px;
    height:850px;

    background:
    linear-gradient(
    135deg,
    #1a0d24,
    #07040d);

    border:2px solid #7f59d8;
    border-radius:10px;

    position:relative;

    box-shadow:
    0 0 100px rgba(127,89,216,.25),
    inset 0 0 60px rgba(255,255,255,.03);

    cursor:pointer;
    transition:.4s;

    text-decoration:none;
}

.libro:hover{
    transform:scale(1.02);

    box-shadow:
    0 0 120px rgba(127,89,216,.4),
    inset 0 0 60px rgba(255,255,255,.03);
}

.esquina{
    position:absolute;
    width:80px;
    height:80px;
    border:2px solid #b88cff;
}

.esquina1{
    top:20px;
    left:20px;
    border-right:none;
    border-bottom:none;
}

.esquina2{
    top:20px;
    right:20px;
    border-left:none;
    border-bottom:none;
}

.esquina3{
    bottom:20px;
    left:20px;
    border-right:none;
    border-top:none;
}

.esquina4{
    bottom:20px;
    right:20px;
    border-left:none;
    border-top:none;
}

.contenido{
    height:100%;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;
    color:white;

    padding:60px;
}

.nombre{
    color:#b88cff;
    font-size:1.2rem;
    letter-spacing:12px;
    margin-bottom:25px;
}

h1{
    font-size:4.5rem;
    line-height:1;

    color:#f3e9ff;

    text-shadow:
    0 0 15px rgba(184,140,255,.2);
}

.subtitulo{
    margin-top:25px;

    color:#9b73ff;

    letter-spacing:8px;
    font-size:.95rem;
}

.ornamento{
    margin-top:35px;

    color:#c8a7ff;

    font-size:1.4rem;

    letter-spacing:25px;
}

.frase{
    margin-top:40px;

    color:#bca7d8;

    line-height:2;

    font-style:italic;
}

.boton{
    margin-top:60px;

    border:1px solid #8f69ff;

    padding:18px 50px;

    color:#e8dfff;

    letter-spacing:5px;

    transition:.3s;
}

.libro:hover .boton{
    background:rgba(143,105,255,.15);
}

</style>
</head>

<body>

<a href="clientes.html" class="libro">

<div class="esquina esquina1"></div>
<div class="esquina esquina2"></div>
<div class="esquina esquina3"></div>
<div class="esquina esquina4"></div>

<div class="contenido">

<div class="nombre">
D A P H N E
</div>

<h1>
REGISTRO<br>
DE ENCARGOS
</h1>

<div class="subtitulo">
MODISMO MÁGICO
</div>

<div class="ornamento">
✦ ✦ ✦
</div>

<div class="frase">
Cada puntada guarda un secreto.<br>
Cada encargo permanece escrito.
</div>

<div class="boton">
ABRIR GRIMORIO
</div>

</div>

</a>

</body>
</html>
