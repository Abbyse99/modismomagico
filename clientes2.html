<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Grimorio</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at center,
    #1d0d32 0%,
    #0a0315 60%,
    #000000 100%);

    font-family:'Cinzel', serif;

    overflow:hidden;
}

.libro{

    width:92vw;
    height:90vh;

    position:relative;

    display:flex;

    border:1px solid #8f69ff;

    background:
    linear-gradient(
    90deg,
    #170d26 0%,
    #1f1431 47%,
    #12091e 50%,
    #1f1431 53%,
    #170d26 100%);

    box-shadow:
    0 0 50px rgba(143,105,255,.15);

}

.libro::after{

    content:"";

    position:absolute;

    left:50%;
    top:0;

    width:6px;
    height:100%;

    transform:translateX(-50%);

    background:
    linear-gradient(
    to right,
    rgba(255,255,255,.03),
    rgba(143,105,255,.6),
    rgba(255,255,255,.03));

    box-shadow:
    0 0 25px rgba(143,105,255,.5);
}

.pagina{

    flex:1;

    display:flex;
    flex-direction:column;

    justify-content:center;
    align-items:center;

    text-align:center;
}

.foto{

    width:280px;
    height:380px;

    border:1px solid #8f69ff;

    opacity:.25;

    margin-bottom:35px;
}

.nombre{

    font-size:2rem;

    color:#9d73ff;

    opacity:.35;

    letter-spacing:3px;
}

.flecha{

    position:absolute;

    left:25px;

    top:50%;

    transform:translateY(-50%);

    color:#8f69ff;

    text-decoration:none;

    font-size:4rem;

    transition:.3s;
}

.flecha:hover{

    color:#e6d8ff;

    text-shadow:
    0 0 15px #b88cff,
    0 0 30px #b88cff;
}

.cerrar{

    position:absolute;

    bottom:30px;

    left:30px;

    color:#8f69ff;

    text-decoration:none;

    font-size:.9rem;
}

.cerrar:hover{

    color:#e6d8ff;
}

.transicion{

    position:fixed;

    inset:0;

    background:
    radial-gradient(
    circle,
    rgba(143,105,255,.6) 0%,
    rgba(20,5,40,.95) 50%,
    #000 100%);

    opacity:0;

    pointer-events:none;

    z-index:9999;
}

.transicion.activa{

    animation:abrir .7s forwards;
}

@keyframes abrir{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

</style>
</head>

<body>

<div class="libro">

    <div class="pagina">

        <div class="foto"></div>

        <div class="nombre">
            PÁGINA DISPONIBLE
        </div>

    </div>

    <div class="pagina">

        <div class="foto"></div>

        <div class="nombre">
            PÁGINA DISPONIBLE
        </div>

    </div>

    <a href="clientes.html" class="flecha">
        ❮
    </a>

    <a href="index.html" class="cerrar">
        ✦ Cerrar grimorio
    </a>

</div>

<div class="transicion" id="transicion"></div>

<script>

document.querySelectorAll('a').forEach(enlace => {

    enlace.addEventListener('click', function(e){

        const destino = this.getAttribute('href');

        if(!destino) return;

        e.preventDefault();

        document
        .getElementById('transicion')
        .classList
        .add('activa');

        setTimeout(() => {

            window.location.href = destino;

        }, 650);

    });

});

</script>

</body>
</html>
