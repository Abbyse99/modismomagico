<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modismo Mágico Daphne</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:black;
    overflow:hidden;
}

.portada{
    position:relative;
    width:100vw;
    height:100vh;
}

.portada img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Zona clicable sobre el botón del libro */

.abrir-grimorio{

    position:absolute;

    left:50%;
    top:73%;

    transform:translateX(-50%);

    width:320px;
    height:90px;

    cursor:pointer;

}

</style>
</head>

<body>

<div class="portada">

    <!-- CAMBIA EL NOMBRE SI TU IMAGEN TIENE OTRO -->
    <img src="portada.jpg.png" alt="Modismo Mágico Daphne">

    <a href="clientes.html" class="abrir-grimorio"></a>

</div>

</body>
</html>
